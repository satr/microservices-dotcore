services:

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8080
      # Tokens carry iss=http://localhost:8888/realms/library (browser-reachable URL)
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8888
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_BACKCHANNEL: "false"
    ports:
      - "8888:8080"
    volumes:
      - ./docker/keycloak-realm.json:/opt/keycloak/data/import/realm.json
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    ports:
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "4317:4317"
      - "4318:4318"
    environment:
      - COLLECTOR_ZIPKIN_HTTP_PORT=9411
      - COLLECTOR_OTLP_ENABLED=true

  postgres:
    image: postgres:16
    container_name: postgres
    environment:
      POSTGRES_USER: library
      POSTGRES_PASSWORD: library
      POSTGRES_DB: library
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library"]
      interval: 10s
      timeout: 5s
      retries: 10

  users-service:
    build:
      context: .
      dockerfile: services/UsersService/Dockerfile
    container_name: users-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=users_db;Username=library;Password=library
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
      - Keycloak__Authority=http://localhost:8888/realms/library
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/library/.well-known/openid-configuration
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "5001:8080"

  books-service:
    build:
      context: .
      dockerfile: services/BooksService/Dockerfile
    container_name: books-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=books_db;Username=library;Password=library
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
      - Keycloak__Authority=http://localhost:8888/realms/library
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/library/.well-known/openid-configuration
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "5002:8080"

  booking-service:
    build:
      context: .
      dockerfile: services/BookingService/Dockerfile
    container_name: booking-service
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=booking_db;Username=library;Password=library
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
      - Keycloak__Authority=http://localhost:8888/realms/library
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/library/.well-known/openid-configuration
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
      keycloak:
        condition: service_healthy
    ports:
      - "5003:8080"

  workflow-saga:
    build:
      context: .
      dockerfile: workflow-saga/WorkflowSaga/Dockerfile
    container_name: workflow-saga
    environment:
      - DOTNET_ENVIRONMENT=Production
      - RabbitMq__Host=rabbitmq
      - RabbitMq__Username=guest
      - RabbitMq__Password=guest
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
    depends_on:
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started

  frontend:
    build:
      context: .
      dockerfile: frontend/LibraryWeb/Dockerfile
    container_name: frontend
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ServiceEndpoints__Users=http://users-service:8080
      - ServiceEndpoints__Books=http://books-service:8080
      - ServiceEndpoints__Booking=http://booking-service:8080
      - OpenTelemetry__OtlpEndpoint=http://jaeger:4317
      # Browser uses localhost:8888; server-side OIDC discovery uses internal keycloak URL
      - Keycloak__Authority=http://localhost:8888/realms/library
      - Keycloak__MetadataAddress=http://keycloak:8080/realms/library/.well-known/openid-configuration
    depends_on:
      - users-service
      - books-service
      - booking-service
      - jaeger
      - keycloak
    ports:
      - "8080:8080"

volumes:
  postgres_data:
